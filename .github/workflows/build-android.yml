name: Build Android APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild (generate android/)
        run: pnpm exec expo prebuild --platform android --clean

      - name: Patch build.gradle for async-storage local maven repo
        run: |
          # async-storage ships a local maven repo that must be in allprojects.repositories
          if ! grep -q "async-storage" android/build.gradle; then
            sed -i '/mavenCentral()/a\        maven { url "$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo" }' android/build.gradle
            echo "Patched build.gradle with async-storage local maven repo"
          else
            echo "async-storage repo already present"
          fi

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: huandao-cockpit-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
